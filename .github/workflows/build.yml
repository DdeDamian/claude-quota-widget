name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the .plasmoid to a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zip libxml2-utils

      - name: Validate package metadata
        run: |
          python3 -c "import json; json.load(open('package/metadata.json'))"
          xmllint --noout package/contents/config/main.xml
          test -f package/contents/scripts/claude-quota-json
          bash -n package/contents/scripts/claude-quota-json

      - name: Build .plasmoid
        run: ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-quota-plasmoid
          path: "*.plasmoid"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.plasmoid"
          generate_release_notes: true
